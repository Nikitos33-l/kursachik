<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel = "stylesheet" href="css/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Услуги СТО </title>
</head>
<body>
        <div class="page">
          <div class="head">
            <div class="lock-button">
              <img src="icons/lock.png" alt="Замок">
            </div>
            <h2>Добро пожаловать</h2>
            <p>Управление вашим аккаунтом</p>
          </div>
          <div class="tab-wrapper">
            <div class="tabs">
              <button id="login-tab" class="tab active">Вход</button>
              <button id="register-tab" class="tab">Регистрация</button>
            </div>
          </div>
          <div class="container">
            <form id="login" class="form active">
                <label>Электронная почта</label>
                <div class="input-group">
                  <img src="icons/mail.png" class="input-icon" alt="Email">
                  <input type="email" id="login_email" placeholder="example@gmail.com" required>
                </div>
              
                <label>Пароль</label>
                <div class="input-group">
                  <img src="icons/password.png" class="input-icon" alt="Lock">
                  <input type="password" id="login_password" placeholder="Введите пароль" required>
                </div>
              
                <button id = "login_but" type="submit">Войти</button>
              </form>
              
      
            <form id="register" class="form">
                <label >Имя пользователя</label>
                <div class="input-group">
                    <img src="icons/person.png" class="input-icon" alt="person">
                    <input id = "register_name" type="text" placeholder="Введите ваше имя" required>
                </div>
                <label>Электронная почта</label>
                <div class="input-group">
                    <img src="icons/mail.png" class="input-icon" alt="Email">
                    <input id = "register_email" type="email" placeholder="example@gmail.com" required>
                </div>
                <label>Пароль</label>
                <div class="input-group">
                    <img src="icons/password.png" class="input-icon" alt="password">
                    <input id = "register_password" type="password" placeholder="Введите пароль" required>
                </div>
                <button id = "register_but" type="submit">Зарегистрироваться</button>
            </form>
          </div>
        </div>     
   <script type="module" src="../js\register_and_login_script.js"></script>
</body>
</html>
