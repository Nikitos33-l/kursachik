<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель суперадмина</title>
    <link rel="stylesheet" href="css/superadmin_menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="header-text">
        <h1>Панель суперадмина</h1>
        <p>Управление станциями СТО и администраторами</p>
    </div>
</header>

<main class="container">
    <section class="main-actions">
        <div class="action-card" id="openAddStation">
            <div class="icon-box"><i class="fa-solid fa-plus"></i></div>
            <div class="action-info">
                <h2>Добавить станцию</h2>
                <p>Создать новый пункт СТО</p>
            </div>
        </div>

        <div class="action-card" id="openAssignAdmin">
            <div class="icon-box"><i class="fa-solid fa-user-plus"></i></div>
            <div class="action-info">
                <h2>Назначить админа</h2>
                <p>Привязать администратора к станции</p>
            </div>
        </div>
    </section>

    <section class="stations-section">
        <h2>Список станций (<span id="stationsCount">0</span>)</h2>
        <div class="stations-grid" id="stationsGrid"></div>
    </section>
</main>

<div class="overlay" id="overlay"></div>

<div class="modal" id="addStationModal">
    <h3>Добавление новой станции</h3>
    <form id="addStationForm">
        <div class="form-row">
            <div class="form-group">
                <label>Название станции</label>
                <input type="text" name="name" placeholder="СТО &quot;Восточный&quot;" required>
            </div>
            <div class="form-group">
                <label>Адрес</label>
                <input type="text" name="address" placeholder="г.Минск, ул. Гагарина, 25" required>
            </div>
        </div>
        <div class="modal-actions">
            <button type="submit" class="btn btn-primary">Добавить станцию</button>
            <button type="button" class="btn btn-secondary close-modal">Отмена</button>
        </div>
    </form>
</div>

<div class="modal" id="assignAdminModal">
    <h3>Назначение администратора</h3>
    <form id="assignAdminForm">
        <div class="form-group full-width">
            <label>Выберите станцию</label>
            <select id="stationSelect" name="stationId" required></select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Имя администратора</label>
                <input type="text" id="adminName" name="adminName" required>
            </div>
            <div class="form-group">
                <label>Email администратора</label>
                <input type="email" id="adminEmail" name="adminEmail" required>
            </div>
        </div>

        <div class="form-group full-width">
            <label>Пароль для нового аккаунта</label>
            <input type="password" id="adminPassword" name="adminPassword" required autocomplete="new-password">
        </div>

        <div class="modal-actions">
            <button type="submit" class="btn btn-primary">Назначить</button>
            <button type="button" class="btn btn-secondary close-modal">Отмена</button>
        </div>
    </form>
</div>

<div class="modal" id="editStationModal">
    <h3>Редактирование станции</h3>
    <form id="editStationForm">
        <input type="hidden" id="editStationId">
        <div class="form-row">
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="editStationName" required>
            </div>
            <div class="form-group">
                <label>Адрес</label>
                <input type="text" id="editStationAddress" required>
            </div>
        </div>
        <div class="modal-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" class="btn btn-secondary close-modal">Отмена</button>
        </div>
    </form>
</div>

<script type="module" src="js/superadmin_menu.js"></script>
</body>
</html>
