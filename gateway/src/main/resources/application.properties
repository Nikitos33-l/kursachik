spring.application.name=gateway
server.port = 8080

eureka.client.service-url.default-zone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

spring.cloud.gateway.server.webflux.routes[0].id=security-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://security-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/api/token/refresh

spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/order/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=Auth

spring.cloud.gateway.server.webflux.routes[2].id=station-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://station-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/service/**,/api/stations/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=Auth

spring.cloud.gateway.server.webflux.routes[3].id=user-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/cars/**,/api/user/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=Auth
