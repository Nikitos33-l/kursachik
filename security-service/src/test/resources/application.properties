spring.application.name=security-service
server.port=0

spring.cloud.config.enabled=false

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/security-service-DB

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval = 2000ms

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000


user.exchange.name=user.events

dead.letter.exchange.name=common.dlx

security.dlq.user-created=security-service.user-created.dlq
security.dlq.user-updated=security-service.user-updated.dlq
security.dlq.user-deleted=security-service.user-deleted.dlq

user.create.routing.key=user.created
user.update.routing.key=user.updated
user.delete.routing.key=user.deleted
user.register.routing.key=user.register

security.queue.user-created=security-service.user-created
security.queue.user-updated=security-service.user-updated
security.queue.user-deleted=security-service.user-deleted

eureka.client.service-url.default-zone=http://localhost:8761/eureka

