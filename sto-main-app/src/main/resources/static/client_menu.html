<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/client_menu.css">
    <title>Меню клиента СТО</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=bb79cde2-9ae8-4196-be84-7637e73bd262&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <div class="head">
        <div class="image">
            <img src="icons/wrench.png" alt="Гаечный ключ">
        </div>
        <div class="title-box">
            <div class="title">Панель клиента СТО</div>
            <div class="describe">Создавайте и просматривайте свои заказы легко и быстро</div>
        </div>
    </div>
    <div class="chose_chapter-container">
        <div class="chose-box">
            <input type="radio" name="chapter" value="do_order" id = "order_but" checked />
            <label for="order_but">
                ✨ Создать заказ
              </label>
        </div>
        <div class="chose-box">
            <input type="radio" name="chapter" value="get_order" id = "user_but"/>
            <label for="user_but">
                📋 Мои заказы
              </label>
        </div>
    </div>
    <div class="content"></div>
    <template id = "order-content">
        <div class="selected-branch-card">
            <div class="branch-info-left">
                <div class="branch-icon">
                    <img src="icons/location.png" alt="📍"> </div>
                <div class="branch-text">
                    <span class="branch-label">Выбранный филиал:</span>
                    <h3 class="branch-name" id="selected-sto-name">Загрузка...</h3>
                    <p class="branch-address" id="selected-sto-address"></p>
                </div>
            </div>
            <button class="change-branch-btn" id="btn-change-sto">Изменить</button>
        </div>
      <div class="new-order-container">
        <h2 class="order-title">🚗 Новый заказ</h2>
        <p class="order-subtitle">Заполните информацию о вашем автомобиле</p>
        <div class="form-row">
          <div class="form-row">
            <div class="form-group">
              <label for="car-brand">Марка автомобиля</label>
              <input type="text" id="car-brand" placeholder="Например: Toyota" required>
            </div>
          
            <div class="form-group">
              <label for="car-number">Госномер автомобиля</label>
              <input type="text" id="car-number" placeholder="Например: 1234 AB-7" required>
            </div>
          
            <div class="form-group">
              <label for="car-model">Модель автомобиля</label>
              <input type="text" id="car-model" placeholder="Например: Camry" required>
            </div>
          </div>
          </div>
        <p class="service-title">⚙️ Выберите услуги</p>
        <div class="service-list"></div>
        <div class="order-button-container">
          <button class="order-button">Оформить заказ</button>
        </div>
      </div>
    </template>
    <template id = "no_order_content">
      <div class="empty-orders">
        <div class="empty-orders__image-wrapper">
          <img src="icons/box_empty_order.png" alt="Нет заказов" class="empty-orders__image" />
        </div>
        <h2 class="empty-orders__title">У вас пока нет заказов</h2>
        <p class="empty-orders__subtitle">
          Создайте свой первый заказ на обслуживание автомобиля
        </p>
      </div>
    </template>
    <template id="order-card-content">
        <div class="order-card">
            <div class="car-header-card">
                <div class="car-header-left">
                    <div class="car-icon-wrapper">
                        <img src="icons/car.png" alt="car" />
                    </div>
                    <div class="car-details">
                        <div class="car-model">marka model</div>
                        <div class="car-plate">number</div>

                        <div class="car-sto-info">
                            <img src="icons/location_grey.png" alt="pin" />
                            <span class="car-sto-name">Название СТО</span>
                        </div>

                    </div>
                </div>
                <div class="car-status">Статус</div>
            </div>
            <div class="car-services">
                <div class="service-title">🔧 Услуги:</div>
                <div class="order-service-list">
                </div>
            </div>
            <div class="order-total-banner">
                <span class="order-total-label">Итого:</span>
                <span class="order-total-value">price</span>
            </div>
        </div>
    </template>
    <template id="main-menu-template">
        <div class="welcome-section">
            <h1 class="welcome-title">Что вы хотите сделать?</h1>
            <p class="welcome-subtitle">Выберите действие для продолжения</p>

            <div class="menu-cards-container">
                <div class="menu-card" id="btn-choose-sto">
                    <div class="menu-card-icon">
                        <img src="icons/location.png" alt="Локация">
                    </div>
                    <h3 class="menu-card-title">Выбрать пункт СТО</h3>
                    <p class="menu-card-desc">Найдите ближайший филиал на карте</p>
                </div>

                <div class="menu-card" id="btn-view-orders">
                    <div class="menu-card-icon">
                        <img src="icons/orders_list.png" alt="Заказы">
                    </div>
                    <h3 class="menu-card-title">Мои заказы</h3>
                    <p class="menu-card-desc">Просмотр истории заказов</p>
                </div>
            </div>
        </div>
    </template>

    <template id="sto-list-template">
        <div class="sto-selection-container">
            <button class="back-button">← Назад</button>
            <h2 class="section-title">Выберите пункт СТО</h2>
            <div class="sto-grid">
            </div>
        </div>
    </template>

    <template id="sto-selection-template">
        <div class="sto-layout">
            <div class="sto-sidebar">
                <h2 class="sto-sidebar-title">Наши филиалы</h2>
                <div class="sto-list" id="sto-list-container">
                </div>
            </div>

            <div class="sto-map-section">
                <h2 class="sto-map-title">Карта расположения</h2>
                <div id="yandex-map" class="yandex-map-container"></div>

                <button id="continue-sto-btn" class="continue-btn" style="display: none;">
                    <span class="check-icon">✓</span> <span id="continue-btn-text">Продолжить</span>
                </button>
            </div>
        </div>
    </template>
    
   <script type="module" src="js/client_menu_script.js"></script>
</body>
</html>
