version: '3.8'

x-spring-common-env: &spring-common-env
  SPRING_PROFILES_ACTIVE: dev
  SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
  SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
  SPRING_CLOUD_CONFIG_USERNAME: config_admin
  SPRING_CLOUD_CONFIG_PASSWORD: config_secure_password
  EUREKA_HOST: eureka-server
  RABBITMQ_HOST: rabbitmq
  REDIS_HOST: redis

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-sto
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - sto-network

  redis:
    image: redis:7.2-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    restart: always
    networks:
      - sto-network

  postgres-server:
    image: postgres:16-alpine
    container_name: sto-postgres-server
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - sto-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_APPLICATION_NAME=config-server
      - SERVER_PORT=8888
      - SPRING_PROFILES_ACTIVE=git
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=https://github.com/Nikitos33-l/sto-config-repository
      - SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME=Nikitos33-l
      - SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD=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
      - SPRING_SECURITY_USER_NAME=config_admin
      - SPRING_SECURITY_USER_PASSWORD=config_secure_password
      - ENCRYPT_KEY=PWCCaoXzHnbfDMlp+TkNVSETSVSLcWyoHtO0tKoG0XQ=
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8888"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sto-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=eureka-server
      - SERVER_PORT=8761
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - sto-network

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      <<: *spring-common-env
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      <<: *spring-common-env
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      <<: *spring-common-env
      DB_HOST: postgres-server
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

  security-service:
    build: ./security-service
    container_name: security-service
    environment:
      <<: *spring-common-env
      DB_HOST: postgres-server
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

  station-service:
    build: ./station-service
    container_name: station-service
    environment:
      <<: *spring-common-env
      DB_HOST: postgres-server
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      <<: *spring-common-env
      DB_HOST: postgres-server
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - sto-network

volumes:
  redis_data:
  postgres_data:

networks:
  sto-network:
    driver: bridge