spring.application.name=order-service
server.port=0

spring.cloud.config.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:postgresql://localhost:5432/order_service_DB
spring.datasource.username=postgres
spring.datasource.password=postgres

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

eureka.client.service-url.default-zone=http://localhost:8761/eureka

spring.rabbitmq.host = localhost
spring.rabbitmq.port = 5672
spring.rabbitmq.username = guest
spring.rabbitmq.password = guest

spring.rabbitmq.template.retry.enabled = true
spring.rabbitmq.template.retry.initial-interval = 2000ms
spring.rabbitmq.template.retry.max-attempts=3

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000


notification.exchange=notification.events
notification.routing.key=notification.send

user.event.exchange=user.events
user.delete.queue=order-service.user-deleted
user.delete.routing.key = user.deleted

user.update.queue=order-service.user-update.queue
user.update.routing.key=user.updated

station.exchange.name=station.events
station.delete.queue=order-service.station-deleted
station.delete.routing.key=station.deleted

station.services.updated.queue=order-service.station-services-updated
station.services.updated.routing.key=station.services.updated
order.dlq.station-services-updated=order-service.station-services-updated.dlq

order.exchange=order.events
order.paid.routing.key=order.paid
order.paid.queue=order-service.order-paid.queue


dead.letter.exchange.name=common.dlx

order.dlq.user-delete=order-service.user-deleted.dlq
order.dlq.station-delete=order-service.station-deleted.dlq
order.dlq.user-update=order-service.user-update.dlq


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

spring.cache.type=redis