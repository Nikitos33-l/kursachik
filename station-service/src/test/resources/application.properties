spring.application.name=station-service
server.port = 0

spring.cloud.config.enabled=false


spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:postgresql://localhost:5432/station_service-DB
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval=2000ms

station.exchange.name=station.events

station.delete.routing.key=station.deleted
station.services.updated.routing.key=station.services.updated


logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

eureka.client.service-url.default-zone=http://localhost:8761/eureka

geocoder.api.key=bb79cde2-9ae8-4196-be84-7637e73bd262
geocoder.api.url=https://geocode-maps.yandex.ru/1.x/

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

spring.cache.type=redis